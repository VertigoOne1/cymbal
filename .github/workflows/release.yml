name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Resolve release ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" go test ./...

      - name: Build
        run: |
          CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" \
            go build -trimpath -ldflags="-s -w" -o cymbal .
          tar czf cymbal_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz cymbal

      - uses: actions/upload-artifact@v4
        with:
          name: cymbal_${{ matrix.goos }}_${{ matrix.goarch }}
          path: cymbal_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Rename and checksum
        run: |
          cd dist
          TAG=${{ steps.tag.outputs.tag }}
          for f in cymbal_*.tar.gz; do
            arch=$(echo "$f" | sed 's/cymbal_\(.*\)\.tar\.gz/\1/' | sed 's/amd64/x86_64/')
            mv "$f" "cymbal_${TAG}_${arch}.tar.gz"
          done
          sha256sum cymbal_*.tar.gz > checksums.txt
          ls -la

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/cymbal_*.tar.gz
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
